name: Build Sonic Mania (PC & Mobile)

on:
  push:
    paths:
      - dependencies/**
      - SonicMania/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master

env:
  GENERAL_FLAGS: "-DWITH_RSDK=ON -DCMAKE_BUILD_TYPE=Release"
  V5U_FLAGS: "-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"

jobs:
  # ----------------------------------------------------
  # JOB 1: Windows 64-bit Engine & Game DLL Compilation
  # ----------------------------------------------------
  build-pc-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Windows Binaries
        run: |
          cmake -B build_v5U ${{env.GENERAL_FLAGS}} -A x64 ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release

      - name: Gather Flat Root Outputs
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item ./build_v5U/Release/*.dll artifacts/
          Copy-Item ./build_v5U/Release/*.exe artifacts/

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows-x64
          path: artifacts

  # ----------------------------------------------------
  # JOB 2: Native Android Engine & Game APK Compilation
  # ----------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Root Engine Codebase
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject Custom Game Files From Your Repository
        uses: actions/checkout@v4
        with:
          repository: "fahamrehman247/Sonic-Mania-Decompilation"
          path: "dependencies/android/app/jni/Game"

      - name: Set Up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configure Android SDK & Native NDK
        uses: android-actions/setup-android@v3

      - name: Fetch Media Libraries (Ogg & Theora)
        run: |
          mkdir -p dependencies/android/app/jni/dependencies
          cd dependencies/android/app/jni/dependencies
          
          # Fetch using your updated high-version official archive trees
          curl -L https://xiph.org -o ogg.tar.gz
          curl -L https://xiph.org -o theora.tar.gz
          
          # Extract tarball distributions safely without wildcard dropouts
          tar -xzf ogg.tar.gz
          tar -xzf theora.tar.gz
          rm -f *.tar.gz
          
          # Map directories cleanly to match target naming conventions
          mv libogg-1.3.6 libogg
          mv libtheora-1.2.0 libtheora

      - name: Grant Shell Permissions to Gradle Wrapper
        run: chmod +x dependencies/android/gradlew

      - name: Execute Android Compiler Pipeline (v5U)
        working-directory: ./dependencies/android
        run: |
          ./gradlew assembleRelease --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a" -PRETRO_REVISION=3
          mkdir -p ../../final_apk
          cp app/build/outputs/apk/release/*.apk ../../final_apk/Sonic_Mania_v5U_Android.apk || cp app/build/outputs/apk/*/release/*.apk ../../final_apk/Sonic_Mania_v5U_Android.apk || true

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mania-android-apk
          path: final_apk
