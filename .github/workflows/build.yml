name: Build Sonic Mania (PC)

on:
  push:
    paths:
      - dependencies/**
      - SonicMania/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master

env:
  V5U_FLAGS: "-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"

jobs:
  # ----------------------------------------------------
  # JOB: Windows 64-bit Engine & Game DLL Compilation
  # ----------------------------------------------------
  build-pc-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # FIXED: Overrides the environment and forces the runner to deploy CMake 3.31.12
      - name: Setup Specific CMake Version
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.12'

      - name: Install Base Graphics & Audio Layers via Vcpkg
        run: |
          vcpkg install glew glfw3 sdl2 --triplet=x64-windows-static

      # FIXED: Executes cleanly on CMake 3.31.12 using your manual ogg/theora locations
      - name: Compile Windows Binaries
        shell: pwsh
        run: |
          cmake -B build_v5U -G "Visual Studio 17 2022" -A x64 -DWITH_RSDK=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_PATH/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DOGG_INCLUDE_DIR="dependencies/RSDKv5/android/libogg/include" -DTHEORA_INCLUDE_DIR="dependencies/RSDKv5/android/libtheora/include" ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release

      - name: Gather Flat Root Outputs
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item ./build_v5U/Release/*.dll artifacts/
          Copy-Item ./build_v5U/Release/*.exe artifacts/

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows-x64
          path: artifacts
