name: Build Sonic Mania (PC & Mobile)

on:
  push:
    paths:
      - dependencies/**
      - SonicMania/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master

env:
  GENERAL_FLAGS: "-DWITH_RSDK=ON -DCMAKE_BUILD_TYPE=Release"
  V5U_FLAGS: "-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"
  WIN64_FLAGS: "-DVCPKG_TARGET_TRIPLET=x64-windows-static"

jobs:
  # ----------------------------------------------------
  # JOB 1: Windows 64-bit Engine & Game DLL Compilation
  # ----------------------------------------------------
  build-pc-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile Windows Binaries
        shell: pwsh
        run: |
          cmake -B build_v5U ${{env.GENERAL_FLAGS}} -DCMAKE_TOOLCHAIN_FILE="C:/vckpg/scripts/buildsystems/vcpkg.cmake" ${{env.WIN64_FLAGS}} ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release

      - name: Gather Flat Root Outputs
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item ./build_v5U/Release/*.dll artifacts/
          Copy-Item ./build_v5U/Release/*.exe artifacts/

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows-x64
          path: artifacts

