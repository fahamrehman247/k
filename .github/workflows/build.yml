name: Build Sonic Mania (PC)

on:
  push:
    paths:
      - dependencies/**
      - SonicMania/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master

env:
  V5U_FLAGS: "-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"

jobs:
  # ----------------------------------------------------
  # JOB: Windows 64-bit Engine & Game DLL Compilation
  # ----------------------------------------------------
  build-pc-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Specific CMake Version
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.12'

      - name: Setup and Bootstrap Vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: 'C:/vcpkg'

      - name: Install Base Graphics & Audio Layers via Vcpkg
        run: |
          C:/vcpkg/vcpkg install glew glfw3 sdl2 --triplet=x64-windows-static

      # FIXED: Added -DRETRO_STANDALONE=OFF to force the creation of Game.dll
      # FIXED: Direct tracking paths to bypass missing path constraints
      - name: Compile Windows Binaries
        shell: pwsh
        run: |
          cmake -B build_v5U -G "Visual Studio 17 2022" -A x64 -DWITH_RSDK=ON -DRETRO_STANDALONE=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DOGG_INCLUDE_DIR="dependencies/RSDKv5/android/libogg/include" -DTHEORA_INCLUDE_DIR="dependencies/RSDKv5/android/libtheora/include" ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release

      # FIXED: Updated to copy any generated .dll and .exe files from the build tree
      - name: Gather Flat Root Outputs
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path ./build_v5U/Release/ -Include *.dll, *.exe -Recurse | Copy-Item -Destination artifacts/

      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows-x64
          path: artifacts
