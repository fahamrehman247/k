      # FIXED: Updated directory to point exactly to RSDKv5/android
      - name: Make gradlew executable
        working-directory: ./dependencies/RSDKv5/android
        run: chmod +x ./gradlew

      - name: Set Up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configure Android SDK & Native NDK
        uses: android-actions/setup-android@v3

      - name: Inject Custom Files into JNI Directory
        run: |
          mkdir -p dependencies/RSDKv5/android/app/jni
          cp -r SonicMania-Custom/* dependencies/RSDKv5/android/app/jni/Game || true

      # FIXED: Updated build directory and relative apk copy paths
      - name: Execute Android Compiler Pipeline (v5U)
        working-directory: ./dependencies/RSDKv5/android
        run: |
          ./gradlew assembleRelease --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a" -PRETRO_REVISION=3 -PRETRO_DISABLE_PLUS=OFF
          mkdir -p ../../../../final_apk
          cp app/build/outputs/apk/release/*.apk ../../../../final_apk/Sonic_Mania_v5U_Android.apk || cp app/build/outputs/apk/*/release/*.apk ../../../../final_apk/Sonic_Mania_v5U_Android.apk || true
